theme = "base16_transparent"

[editor]
scrolloff = 4
mouse = true
scroll-lines = 1
line-number = "relative"
auto-completion = true
auto-format = true
idle-timeout = 500
completion-trigger-len = 3
completion-replace = true
bufferline = "multiple"
color-modes = true

[editor.statusline]
left = ["mode", "spinner", "diagnostics"]
center = ["file-name", "file-modification-indicator", ]
right = ["selections", "position", "position-percentage", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.gutters.line-numbers]
min-width = 3